# Nostr
nostr-sdk = { workspace = true }

# Fedimint
fedimint-api-client = { workspace = true }
fedimint-core = { workspace = true }
secrecy = { workspace = true }

# Crypto
bitcoin = { workspace = true }
secp256k1 = { workspace = true }
