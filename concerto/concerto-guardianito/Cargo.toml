version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "guardianito"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
concerto-common = { path = "../concerto-common" }

# Async runtime
tokio = { workspace = true }
