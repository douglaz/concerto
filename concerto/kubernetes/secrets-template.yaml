# Template for Kubernetes secrets
# Copy this file to secrets.yaml and fill in the base64-encoded values
# Use: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: concerto
type: Opaque
data:
  # Base64 encoded PostgreSQL password
  password: Y2hhbmdlbWU=  # changeme
---
apiVersion: v1
kind: Secret
metadata:
  name: felaas-secrets
  namespace: concerto
type: Opaque
data:
  # Base64 encoded database URL
  database-url: cG9zdGdyZXM6Ly9mZWxhYXM6Y2hhbmdlbWVAcG9zdGdyZXMvZmVsYWFz  # postgres://felaas:changeme@postgres/felaas
  # Base64 encoded provider nsec
  provider-nsec: bnNlYzEuLi4=  # nsec1...
---
apiVersion: v1
kind: Secret
metadata:
  name: guardianito-secrets
  namespace: concerto
type: Opaque
data:
  # Base64 encoded owner npub
  owner-npub: bnB1YjEuLi4=  # npub1...
  # Base64 encoded guardian nsec
  guardian-nsec: bnNlYzEuLi4=  # nsec1...
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: concerto
type: Opaque
data:
  # Base64 encoded Grafana admin password
  admin-password: YWRtaW4=  # admin