version: '3.8'

services:
  guardianito-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=guardianito
      - POSTGRES_PASSWORD=guardianito
      - POSTGRES_DB=guardianito
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5432:5432"
    volumes:
      - guardianito_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardianito"]
      interval: 10s
      timeout: 5s
      retries: 5

  felaas-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=felaas
      - POSTGRES_PASSWORD=felaas
      - POSTGRES_DB=felaas
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "5433:5432"
    volumes:
      - felaas_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U felaas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  guardianito_db_data:
  felaas_db_data: