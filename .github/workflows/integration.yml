name: Integration Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  integration:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
    
    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: cargo-registry-integration-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-registry-integration-${{ runner.os }}-
    
    - name: Build integration test binary
      run: |
        nix develop -c cargo build --package felaas-oss-integration-tests
    
    # TODO: Enable actual integration tests once k3d setup is fixed in CI
    # For now, just ensure the integration test binary builds successfully
    - name: Check integration test compilation
      run: |
        echo "Integration tests compile successfully"
        echo "Full k3d cluster tests will be enabled in a future update"