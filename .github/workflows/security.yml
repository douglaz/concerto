name: Security Audit

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    # Run security audit daily at 3 AM UTC
    - cron: '0 3 * * *'

jobs:
  security_audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Install Nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable
        extra_nix_config: |
          experimental-features = nix-command flakes
    
    - name: Run security audit
      run: |
        # Use cargo-audit from Nix environment
        nix develop -c cargo audit
      continue-on-error: true  # Don't fail the build on advisories
    
    - name: Check for critical vulnerabilities
      run: |
        # This will fail the build if there are critical vulnerabilities
        nix develop -c cargo audit --deny warnings || {
          echo "::warning::Security vulnerabilities found. Please review cargo audit output."
          exit 0  # Convert to warning instead of failure for now
        }
    
    - name: Check dependencies with cargo-deny
      run: |
        # Additional security checks with cargo-deny if available
        nix develop -c cargo deny check || echo "cargo-deny not available in environment"
      continue-on-error: true