apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-custom
  namespace: kube-system
data:
  # Use only the override pattern - this gets imported into the main server block
  felaas.override: |
    # Rewrite all *.internal.felaas.dev domains to the nginx ingress controller
    rewrite name regex (.+\.)?internal\.felaas\.dev ingress-nginx-controller.ingress-nginx.svc.cluster.local answer auto